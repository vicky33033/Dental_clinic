<!DOCTYPE html>
<html>
<head>
  <title>Add Patient</title>
</head>
<body>

  <h2>Add Patient</h2>

  <input id="name" placeholder="Name"><br><br>
  <input id="age" placeholder="Age"><br><br>
  <input id="gender" placeholder="Gender"><br><br>
  <input id="phone" placeholder="Phone"><br><br>
  <input id="date" type="date"><br><br>
  <input id="time" type="time"><br><br>
  <input type="file" id="file" multiple><br><br>

  <input id="complaints" placeholder="Complaints"><br><br>
  <input id="opd" placeholder="OPD Notes"><br><br>
  <input id="diagnosis" placeholder="Diagnosis"><br><br>

  <button onclick="addPatient()">Save Patient</button>

  <script type="module" src="firebase.js"></script>
  <script type="module" src="patient.js"></script>

</body>
</html>
